name: SonnaLab Frontend | CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT }} -T 15 -H ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts 2>&1 || true

      - name: Test SSH connectivity
        run: |
          PORT=${{ secrets.DEPLOY_SSH_PORT }}
          HOST=${{ secrets.DEPLOY_SSH_HOST }}
          echo "Probing port $PORT on $HOST..."
          timeout 10 bash -c "echo >/dev/tcp/$HOST/$PORT" \
            && echo "Port $PORT reachable" \
            || { echo "::error::Port $PORT unreachable on $HOST — check Hetzner Cloud Firewall"; exit 1; }

      - name: Deploy to /var/www
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }} -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"

          DEPLOY_OK=0
          for ATTEMPT in 1 2 3; do
            if rsync -a --delete -e "ssh $SSH_OPTS" \
              build/ ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:/var/www/sonnalab.com/build/; then
              DEPLOY_OK=1
              break
            fi
            echo "rsync attempt $ATTEMPT/3 failed"
            [ "$ATTEMPT" -lt 3 ] && sleep 15
          done

          [ "$DEPLOY_OK" -ne 1 ] && { echo "Deployment failed after 3 attempts"; exit 1; }

          ssh $SSH_OPTS ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} \
            "chmod -R 775 /var/www/sonnalab.com/build/"
          echo "Frontend deployed"
